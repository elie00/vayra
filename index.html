    <style>
      html, body, #root {
        background: #0a0a0a;
        color-scheme: dark;
        margin: 0;
        height: 100%;
      }
      #harbor-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        z-index: 9999;
        pointer-events: none;
        transition: opacity 280ms ease-out;
      }
      #harbor-boot.gone { opacity: 0; }
      #harbor-boot svg {
        width: 96px;
        height: auto;
        color: #f5f5f5;
        filter: drop-shadow(0 10px 30px rgba(232, 170, 108, 0.22));
        transform-origin: center 65%;
        animation:
          harborBootBob 2400ms ease-in-out infinite,
          harborBootGlow 2400ms ease-in-out infinite;
      }
      @keyframes harborBootBob {
        0%   { transform: translateY(0)    rotate(-2deg) scale(0.98); }
        25%  { transform: translateY(-3px) rotate( 0deg) scale(1.00); }
        50%  { transform: translateY(0)    rotate( 2deg) scale(1.02); }
        75%  { transform: translateY(-3px) rotate( 0deg) scale(1.00); }
        100% { transform: translateY(0)    rotate(-2deg) scale(0.98); }
      }
      @keyframes harborBootGlow {
        0%, 100% { opacity: 0.78; }
        50%      { opacity: 1; }
      }
    </style>
    <script>
      (function () {
        try {
          var p = new URLSearchParams(window.location.search);
          if (p.get('vayra-modal') === '1') {
            var s = document.createElement('style');
            s.textContent = '#harbor-boot{display:none !important}';
            document.head.appendChild(s);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="harbor-boot">
      <svg viewBox="0 0 512 512" fill="currentColor" aria-hidden="true">
