name: tauri-build

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.platform.name }} (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
          - name: macOS-AppleSilicon
            runner: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - name: Linux-x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb,appimage

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: contains(matrix.platform.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libmpv-dev \
            libgtk-3-dev \
            patchelf

      - name: Install Mac deps
        if: contains(matrix.platform.runner, 'macos')
        run: |
          brew install mpv pkg-config
          # Make pkg-config find libmpv from homebrew
          echo "PKG_CONFIG_PATH=$(brew --prefix mpv)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }},wasm32-unknown-unknown

      - name: Install wasm-pack 0.13.1
        run: cargo install wasm-pack --version 0.13.1 --locked

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            vayra-core
            src-tauri

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Fetch libmpv (Windows)
        if: contains(matrix.platform.runner, 'windows')
        run: pnpm run setup:libmpv

      - name: Fetch external binaries
        shell: bash
        env:
          YTDLP_VERSION: "2026.07.04"
        run: |
          set -euo pipefail
          mkdir -p src-tauri/binaries
          cd src-tauri/binaries
          TARGET="${{ matrix.platform.target }}"
          EXT=""
          if [[ "$TARGET" == *"windows"* ]]; then EXT=".exe"; fi

          # Verify a "sha256  filename" line from stdin, cross-platform.
          # Windows runners lack `shasum`; macOS lacks `sha256sum` — pick what's
          # present, and fall back to certutil on Windows.
          sha256check() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum --check -
            elif command -v shasum >/dev/null 2>&1; then
              shasum -a 256 --check -
            else
              read -r expected file
              actual=$(certutil -hashfile "$file" SHA256 | sed -n 2p | tr -d '[:space:]\r' | tr 'A-F' 'a-f')
              if [ "$actual" != "$expected" ]; then echo "checksum mismatch: $file"; exit 1; fi
              echo "$file: OK"
            fi
          }

          echo "Downloading and verifying yt-dlp ${YTDLP_VERSION}..."
          curl --fail --location --retry 3 \
            "https://github.com/yt-dlp/yt-dlp/releases/download/${YTDLP_VERSION}/SHA2-256SUMS" \
            -o yt-dlp.SHA2-256SUMS
          if [[ "$TARGET" == *"windows"* ]]; then
            YTDLP_ASSET="yt-dlp.exe"
          elif [[ "$TARGET" == *"apple"* ]]; then
            YTDLP_ASSET="yt-dlp_macos"
          else
            YTDLP_ASSET="yt-dlp"
          fi
          curl --fail --location --retry 3 \
            "https://github.com/yt-dlp/yt-dlp/releases/download/${YTDLP_VERSION}/${YTDLP_ASSET}" \
            -o "${YTDLP_ASSET}"
          grep "  ${YTDLP_ASSET}$" yt-dlp.SHA2-256SUMS | sha256check
          mv "${YTDLP_ASSET}" "yt-dlp-${TARGET}${EXT}"
          chmod +x "yt-dlp-${TARGET}${EXT}" || true

          echo "Fetching ffmpeg and ffprobe..."
          if [[ "$TARGET" == *"windows"* ]]; then
            FFMPEG_ASSET="ffmpeg-n8.1-latest-win64-gpl-8.1.zip"
            curl --fail --location --retry 3 \
              "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/checksums.sha256" \
              -o checksums.sha256
            curl --fail --location --retry 3 \
              "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/${FFMPEG_ASSET}" \
              -o "${FFMPEG_ASSET}"
            grep "  ${FFMPEG_ASSET}$" checksums.sha256 | sha256check
            mv "${FFMPEG_ASSET}" ffmpeg.zip
            unzip -j ffmpeg.zip "*/bin/ffmpeg.exe" "*/bin/ffprobe.exe"
            mv ffmpeg.exe "ffmpeg-${TARGET}${EXT}"
            mv ffprobe.exe "ffprobe-${TARGET}${EXT}"
          elif [[ "$TARGET" == *"apple"* ]]; then
            if [[ "$TARGET" == *"aarch64"* ]]; then
              FFMPEG_SHA256="15e67ff413d3d2436ddb3efd282344e50b8f1c6f834979b984371b90ebaf0449"
              FFPROBE_SHA256="582842ca7e76197ae8f4299b7f5f2d257b42168f314fc37a675708b9d5f847e0"
              curl --fail --location --retry 3 "https://www.osxexperts.net/ffmpeg6arm.zip" -o ffmpeg.zip
              curl --fail --location --retry 3 "https://www.osxexperts.net/ffprobe6arm.zip" -o ffprobe.zip
            else
              FFMPEG_SHA256="034a8d6eafb2736711d98e897dc22cc5769c7c31bde9a40ac20f58cbd57f68d8"
              FFPROBE_SHA256="5ed6e3a619edd06d81c506e085aeef85e3f5b5bcc34d032b01bb1b125413cd03"
              curl --fail --location --retry 3 "https://www.osxexperts.net/ffmpeg6intel.zip" -o ffmpeg.zip
              curl --fail --location --retry 3 "https://www.osxexperts.net/ffprobe6intel.zip" -o ffprobe.zip
            fi
            echo "${FFMPEG_SHA256}  ffmpeg.zip" | sha256check
            echo "${FFPROBE_SHA256}  ffprobe.zip" | sha256check
            unzip ffmpeg.zip
            unzip ffprobe.zip
            mv ffmpeg "ffmpeg-${TARGET}${EXT}"
            mv ffprobe "ffprobe-${TARGET}${EXT}"
            chmod +x "ffmpeg-${TARGET}${EXT}" "ffprobe-${TARGET}${EXT}" || true
          else
            FFMPEG_ASSET="ffmpeg-n8.1-latest-linux64-gpl-8.1.tar.xz"
            curl --fail --location --retry 3 \
              "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/checksums.sha256" \
              -o checksums.sha256
            curl --fail --location --retry 3 \
              "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/${FFMPEG_ASSET}" \
              -o "${FFMPEG_ASSET}"
            grep "  ${FFMPEG_ASSET}$" checksums.sha256 | sha256check
            tar -xf "${FFMPEG_ASSET}" --strip-components=2 --wildcards '*/bin/ffmpeg' '*/bin/ffprobe'
            mv ffmpeg "ffmpeg-${TARGET}${EXT}"
            mv ffprobe "ffprobe-${TARGET}${EXT}"
          fi

      - name: vayra-core check
        working-directory: vayra-core
        run: |
          cargo check
          cargo test --all-targets

      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: --target ${{ matrix.platform.target }}

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vayra-${{ matrix.platform.name }}
          path: |
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.exe
          retention-days: 14
          if-no-files-found: warn
