name: frontend

on:
  push:
    paths:
      - "src/**"
      - "vayra-core/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.js"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "src/**"
      - "vayra-core/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.js"
      - ".github/workflows/frontend.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack 0.13.1
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc -b
      - name: Production build (includes vayra-core WASM)
        run: pnpm build
      - name: WASM runtime smoke test
        run: pnpm core:wasm:smoke
      - name: Lint (react-hooks)
        run: pnpm lint
      - name: Unit tests
        run: pnpm test
