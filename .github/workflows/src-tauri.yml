name: src-tauri

on:
  push:
    paths:
      - "src-tauri/**"
      - ".github/workflows/src-tauri.yml"
  pull_request:
    paths:
      - "src-tauri/**"
      - ".github/workflows/src-tauri.yml"

jobs:
  lint-test:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux deps
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libmpv-dev \
            libgtk-3-dev

      - name: Install Mac deps
        if: contains(matrix.os, 'macos')
        run: |
          brew install mpv pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix mpv)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack 0.13.1
        run: cargo install wasm-pack --version 0.13.1 --locked

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Fetch libmpv (Windows)
        if: contains(matrix.os, 'windows')
        shell: pwsh
        run: |
          pnpm run setup:libmpv
          Add-Content $env:GITHUB_PATH "$env:GITHUB_WORKSPACE\src-tauri\libmpv"

      # generate_context! validates every externalBin path even though Clippy and
      # unit tests never execute these tools. Release builds fetch and verify the
      # real binaries separately in tauri-build.yml.
      - name: Create external binary placeholders for static checks
        shell: bash
        run: |
          set -euo pipefail
          TARGET="$(rustc -vV | sed -n 's/^host: //p')"
          test -n "$TARGET"
          EXT=""
          if [[ "$TARGET" == *"windows"* ]]; then EXT=".exe"; fi
          mkdir -p src-tauri/binaries
          for binary in yt-dlp ffmpeg ffprobe; do
            : > "src-tauri/binaries/${binary}-${TARGET}${EXT}"
          done

      # tauri's generate_context! embeds ../dist at compile time, so the frontend
      # must be built before cargo can check/clippy/test the src-tauri crate.
      - name: Build frontend (creates ../dist)
        run: pnpm build

      - name: clippy + test
        shell: bash
        working-directory: src-tauri
        run: |
          # Keep Clippy strict. Linux carries a small, explicit style-lint debt
          # in the native mpv renderer; changing that FFI code requires a
          # documented playback test on Linux, so CI quarantines only those
          # behavior-neutral lints until that hardware validation is available.
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            cargo clippy --all-targets -- \
              -D warnings \
              -A clippy::manual_c_str_literals \
              -A clippy::missing_transmute_annotations \
              -A clippy::redundant_closure \
              -A clippy::needless_return
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            # These two style lints are isolated to the Windows mpv/HDR path.
            # Changing that path also requires documented manual playback.
            cargo clippy --all-targets -- \
              -D warnings \
              -A clippy::needless_return \
              -A clippy::type_complexity
          else
            cargo clippy --all-targets -- -D warnings
          fi
          cargo test --all-targets

  android-check:
    name: Android debug build (arm64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK and NDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.2.12479018"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,wasm32-unknown-unknown

      - name: Install wasm-pack 0.13.1
        run: cargo install wasm-pack --version 0.13.1 --locked

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: android-arm64

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # A debug APK exercises the Gradle/Kotlin project and the Rust Android
      # target without requiring a release keystore or publishing secrets.
      - name: Build Android debug APK
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018"
          export ANDROID_NDK_HOME="$NDK_HOME"
          pnpm tauri android build --debug --target aarch64 --apk --ci
